version: '3.9'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - EXECUTOR_URL=http://executor:3002
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost:5173}
    depends_on:
      executor:
        condition: service_healthy
    restart: unless-stopped

  executor:
    build:
      context: ./executor
      dockerfile: Dockerfile
    ports:
      - '3002:3002'
    environment:
      - PORT=3002
    volumes:
      # Mount Docker socket so executor can spawn sibling containers
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3002/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - '5173:80'
    environment:
      - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:3001}
    depends_on:
      - server
    restart: unless-stopped
